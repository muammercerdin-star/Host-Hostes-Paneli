<!-- Premium Sefer Bitir Modal -->
<div id="finishTripPremiumModal" class="finish-modal-backdrop" aria-hidden="true">
  <div class="finish-modal-card" role="dialog" aria-modal="true">
    <button class="finish-modal-close" type="button" id="finishTripCloseBtn">×</button>

    <div class="finish-modal-icon">🏁</div>

    <div class="finish-modal-kicker">SEFER FİNALİ</div>
    <h2>Seferi Bitir</h2>

    <p class="finish-modal-text">
      Bu seferi bitirme ekranına geçmek üzeresin.
      Devam etmeden önce hesap, emanet ve yolcu kontrolünü gözden geçirmen önerilir.
    </p>

    <div class="finish-modal-trip">
      <div>
        <span>Hat</span>
        <b>{{ trip['route'] }}</b>
      </div>
      <div>
        <span>Plaka</span>
        <b>{{ trip['plate'] }}</b>
      </div>
    </div>

    <div class="finish-modal-warning">
      ⚠️ Bu işlem sefer kapanış ekranına yönlendirir.
    </div>

    <div class="finish-modal-actions">
      <button type="button" class="finish-btn cancel" id="finishTripCancelBtn">Vazgeç</button>
      <button type="button" class="finish-btn done" id="finishTripGoBtn">Seferi Bitir</button>
    </div>
  </div>
</div>

<style id="finish-trip-premium-modal-style">
.finish-modal-backdrop{
  position:fixed;
  inset:0;
  z-index:99999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(2,8,18,.72);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

.finish-modal-backdrop.show{
  display:flex;
}

.finish-modal-card{
  position:relative;
  width:min(92vw,430px);
  padding:28px 24px 22px;
  border-radius:34px;
  color:#0f172a;
  background:
    radial-gradient(circle at 18% 0%, rgba(96,165,250,.22), transparent 34%),
    linear-gradient(180deg,#ffffff,#f4f8ff);
  border:1px solid rgba(255,255,255,.72);
  box-shadow:
    0 32px 80px rgba(0,0,0,.45),
    inset 0 0 0 1px rgba(255,255,255,.70);
  animation:finishPop .18s ease-out;
}

@keyframes finishPop{
  from{ transform:translateY(18px) scale(.96); opacity:.2; }
  to{ transform:translateY(0) scale(1); opacity:1; }
}

.finish-modal-close{
  position:absolute;
  right:18px;
  top:18px;
  width:52px;
  height:52px;
  border:0;
  border-radius:50%;
  background:#fff;
  color:#111827;
  font-size:34px;
  font-weight:950;
  box-shadow:0 14px 32px rgba(15,23,42,.14);
}

.finish-modal-icon{
  width:78px;
  height:78px;
  border-radius:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  background:linear-gradient(145deg,#e0f2fe,#bfdbfe);
  box-shadow:0 18px 34px rgba(37,99,235,.18);
  margin-bottom:18px;
}

.finish-modal-kicker{
  color:#2563eb;
  font-size:15px;
  font-weight:950;
  letter-spacing:.6px;
  margin-bottom:4px;
}

.finish-modal-card h2{
  margin:0;
  color:#0f172a;
  font-size:38px;
  line-height:1;
  font-weight:950;
  letter-spacing:-1px;
}

.finish-modal-text{
  margin:16px 0 18px;
  color:#64748b;
  font-size:18px;
  line-height:1.35;
  font-weight:800;
}

.finish-modal-trip{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:16px 0;
}

.finish-modal-trip div{
  padding:14px;
  border-radius:20px;
  background:#eef6ff;
  border:1px solid rgba(147,197,253,.45);
}

.finish-modal-trip span{
  display:block;
  color:#64748b;
  font-size:13px;
  font-weight:900;
  margin-bottom:5px;
}

.finish-modal-trip b{
  display:block;
  color:#0f172a;
  font-size:16px;
  line-height:1.15;
  font-weight:950;
}

.finish-modal-warning{
  padding:14px 16px;
  border-radius:20px;
  color:#1d4ed8;
  background:#eaf3ff;
  border:1px solid rgba(96,165,250,.34);
  font-size:15px;
  line-height:1.25;
  font-weight:900;
}

.finish-modal-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}

.finish-btn{
  height:62px;
  border:0;
  border-radius:22px;
  font-size:18px;
  font-weight:950;
  cursor:pointer;
}

.finish-btn.cancel{
  color:#2563eb;
  background:#f8fbff;
  border:1px solid rgba(148,163,184,.24);
  box-shadow:0 12px 26px rgba(15,23,42,.08);
}

.finish-btn.done{
  color:#fff;
  background:linear-gradient(145deg,#38bdf8,#2563eb);
  box-shadow:0 16px 34px rgba(37,99,235,.28);
}

@media(max-width:430px){
  .finish-modal-card{
    padding:26px 20px 20px;
    border-radius:32px;
  }

  .finish-modal-card h2{
    font-size:34px;
  }

  .finish-modal-text{
    font-size:16px;
  }

  .finish-modal-trip{
    grid-template-columns:1fr;
  }

  .finish-btn{
    height:58px;
    font-size:16px;
  }
}
</style>

<script id="finish-trip-premium-modal-js">
function openFinishTripModal(){
  const modal = document.getElementById("finishTripPremiumModal");
  if(!modal) return;
  modal.classList.add("show");
  modal.setAttribute("aria-hidden", "false");
}

function closeFinishTripModal(){
  const modal = document.getElementById("finishTripPremiumModal");
  if(!modal) return;
  modal.classList.remove("show");
  modal.setAttribute("aria-hidden", "true");
}

document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("finishTripCloseBtn")?.addEventListener("click", closeFinishTripModal);
  document.getElementById("finishTripCancelBtn")?.addEventListener("click", closeFinishTripModal);

  document.getElementById("finishTripPremiumModal")?.addEventListener("click", function(e){
    if(e.target.id === "finishTripPremiumModal"){
      closeFinishTripModal();
    }
  });

  document.getElementById("finishTripGoBtn")?.addEventListener("click", function(){
    window.location.href = "/end_trip";
  });
});
</script>
