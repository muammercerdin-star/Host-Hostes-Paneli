<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Aktif Sefer Yok</title>

  <style>
    *{box-sizing:border-box}

    html,body{
      min-height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Roboto,Segoe UI,Arial;
      color:#0f172a;
    }

    body{
      background:
        radial-gradient(circle at top left, #dbeafe 0, transparent 36%),
        radial-gradient(circle at top right, #dcfce7 0, transparent 32%),
        linear-gradient(180deg,#f8fbff 0%,#eef4fb 45%,#eaf1f8 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .box{
      width:min(520px,100%);
      border-radius:34px;
      background:linear-gradient(180deg,#ffffff 0%,#eef5fc 100%);
      border:1px solid #cbd9e8;
      box-shadow:0 26px 70px rgba(15,23,42,.18);
      padding:24px;
      text-align:center;
    }

    .icon{
      width:76px;
      height:76px;
      margin:0 auto 14px;
      border-radius:26px;
      background:linear-gradient(180deg,#eff6ff,#ffffff);
      border:1px solid #dbeafe;
      box-shadow:0 12px 30px rgba(37,99,235,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
    }

    h1{
      margin:0 0 10px;
      font-size:28px;
      font-weight:1000;
      letter-spacing:.2px;
    }

    p{
      margin:0 auto 20px;
      max-width:390px;
      color:#64748b;
      line-height:1.45;
      font-size:16px;
      font-weight:750;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:16px;
    }

    a{
      text-decoration:none;
      min-height:56px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:16px;
      border:1px solid #d5e1ec;
      box-shadow:0 8px 20px rgba(15,23,42,.08);
    }

    .primary{
      background:linear-gradient(180deg,#22c55e,#16a34a);
      color:#fff;
      border-color:#16a34a;
    }

    .ghost{
      background:#ffffff;
      color:#334155;
    }

    .hint{
      margin-top:14px;
      font-size:12px;
      color:#94a3b8;
      font-weight:800;
    }
  </style>
</head>

<body>
  <main class="box">
    <div class="icon">🧾</div>

    <h1>Aktif sefer yok</h1>

    <p>
      {{ message or "Bu ekranı kullanmak için önce yeni bir sefer başlatmalısın." }}
    </p>

    <div class="actions">
      <a class="primary" href="{{ action_url }}">🚌 {{ action_text or "Yeni Sefer Başlat" }}</a>
      <a class="ghost" href="{{ home_url }}">🏠 Ana Sayfa</a>
    </div>

    <div class="hint">Sefer başlatınca hesap, koltuk ve emanet ekranları aktif olur.</div>
  </main>
</body>
</html>
