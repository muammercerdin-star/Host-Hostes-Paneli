{% extends "base.html" %}
{% block content %}

<style id="premium-add-route-theme">
/* =========================================================
   PREMIUM HAT EKLE THEME
   /hat-ekle sayfasını modern koyu premium hale getirir.
========================================================= */

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:
    radial-gradient(circle at 20% 0%, rgba(37,99,235,.20), transparent 34%),
    radial-gradient(circle at 96% 28%, rgba(20,184,166,.16), transparent 35%),
    linear-gradient(180deg,#061524,#0b1726 45%,#08111d) !important;
  color:#eaf2ff !important;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif !important;
}

/* Sayfa ana kutusu */
.container,
.page,
.wrap,
main,
form{
  max-width:720px;
}

/* Eski kart/kutu görünümünü premium yap */
.card,
.panel,
.box,
.form-card,
main > div,
body > div{
  border-radius:32px !important;
}

/* Sayfada tek büyük form kartı varsa onu toparla */
form,
.card,
.panel,
.box{
  background:linear-gradient(180deg,rgba(15,31,49,.96),rgba(8,20,34,.96)) !important;
  border:1px solid rgba(148,163,184,.18) !important;
  box-shadow:0 28px 80px rgba(0,0,0,.42) !important;
}

/* Başlık */
h1,
h2{
  color:#f8fbff !important;
  font-size:42px !important;
  line-height:.95 !important;
  font-weight:950 !important;
  letter-spacing:-1.2px !important;
  margin:0 0 20px !important;
}

/* Başlığın üstüne premium rozet etkisi */
h1::before,
h2::before{
  content:"🛣️ Yeni güzergâh";
  display:inline-flex;
  align-items:center;
  width:max-content;
  max-width:100%;
  margin-bottom:14px;
  padding:9px 13px;
  border-radius:999px;
  background:rgba(37,99,235,.16);
  border:1px solid rgba(96,165,250,.30);
  color:#93c5fd;
  font-size:13px;
  line-height:1;
  font-weight:950;
  letter-spacing:.4px;
  text-transform:uppercase;
}

/* Label */
label{
  display:block !important;
  color:#dbeafe !important;
  font-size:18px !important;
  line-height:1.1 !important;
  font-weight:950 !important;
  margin:18px 0 9px !important;
}

/* Input / textarea */
input,
textarea,
select{
  width:100% !important;
  background:#0a1624 !important;
  border:1px solid rgba(148,163,184,.24) !important;
  color:#f8fbff !important;
  border-radius:22px !important;
  padding:16px 18px !important;
  font:inherit !important;
  font-size:17px !important;
  font-weight:850 !important;
  outline:none !important;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.03),
    0 12px 28px rgba(0,0,0,.18) !important;
}

input{
  min-height:62px !important;
}

textarea{
  min-height:230px !important;
  resize:vertical;
  line-height:1.35 !important;
}

input::placeholder,
textarea::placeholder{
  color:#7f8ea3 !important;
  font-weight:750 !important;
}

input:focus,
textarea:focus,
select:focus{
  background:#0d1d30 !important;
  border-color:#60a5fa !important;
  box-shadow:
    0 0 0 4px rgba(96,165,250,.14),
    0 14px 30px rgba(0,0,0,.22) !important;
}

/* Yardım yazısı */
small,
.help,
.note,
p{
  color:#aab8ca !important;
  font-size:15px !important;
  line-height:1.35 !important;
  font-weight:800 !important;
}

/* Buton alanı */
.actions,
.btns,
.buttons,
form > div:last-child{
  display:flex !important;
  justify-content:flex-end !important;
  gap:12px !important;
  flex-wrap:wrap !important;
  margin-top:20px !important;
}

/* Butonlar */
button,
.btn,
a.btn,
input[type="submit"]{
  min-height:58px !important;
  border:0 !important;
  border-radius:21px !important;
  padding:0 24px !important;
  cursor:pointer !important;
  font:inherit !important;
  font-size:18px !important;
  font-weight:950 !important;
  text-decoration:none !important;
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  box-shadow:0 14px 28px rgba(0,0,0,.24) !important;
}

/* Kaydet butonu */
button[type="submit"],
input[type="submit"],
.btn-primary,
.btn.save{
  color:#fff !important;
  background:linear-gradient(145deg,#38bdf8,#2563eb) !important;
  box-shadow:0 16px 34px rgba(37,99,235,.25) !important;
}

/* Vazgeç / geri */
a,
.btn-secondary,
.btn.gray,
button[type="button"]{
  color:#eaf2ff !important;
  background:linear-gradient(180deg,#334155,#1e293b) !important;
  border:1px solid rgba(148,163,184,.18) !important;
}

/* Eski geniş taşan inputları kutuya sığdır */
form *{
  max-width:100%;
}

/* Sayfa dış boşluk */
.container,
.page,
.wrap,
main{
  width:min(94vw,720px) !important;
  margin:18px auto 34px !important;
  padding:16px !important;
  border-radius:32px !important;
}

/* Eğer body içindeki ilk kart form değilse genel görünüm */
body > .container,
body > .page,
body > .wrap,
main{
  background:linear-gradient(180deg,rgba(15,31,49,.96),rgba(8,20,34,.96)) !important;
  border:1px solid rgba(148,163,184,.18) !important;
  box-shadow:0 28px 80px rgba(0,0,0,.42) !important;
}

/* Mobil */
@media(max-width:430px){
  .container,
  .page,
  .wrap,
  main{
    width:calc(100vw - 24px) !important;
    padding:18px !important;
    border-radius:30px !important;
  }

  h1,
  h2{
    font-size:36px !important;
  }

  textarea{
    min-height:210px !important;
  }

  .actions,
  .btns,
  .buttons,
  form > div:last-child{
    display:grid !important;
    grid-template-columns:1fr 1fr !important;
  }

  button,
  .btn,
  a.btn,
  input[type="submit"]{
    width:100% !important;
    padding:0 14px !important;
    font-size:17px !important;
  }
}
</style>

<style>
  .wrap{max-width:820px;margin:24px auto}
  .card{background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:14px;padding:22px 22px 18px;box-shadow:0 6px 16px rgba(0,0,0,.35)}
  h2{margin:0 0 14px 0;font-weight:800}
  label{display:block;margin:12px 0 6px}
  input[type="text"], textarea{
    width:100%;background:#0d1117;color:#e6edf3;border:1px solid #30363d;
    border-radius:10px;padding:12px 14px;outline:none
  }
  textarea{min-height:140px;resize:vertical}
  .hint{font-size:13px;opacity:.85;margin-top:4px}
  .row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
  .btn{appearance:none;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
  .btn.primary{background:#1f6feb;color:#fff}
  .btn.secondary{background:#3a4750;color:#fff}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .muted{font-size:12px;opacity:.75}
  .right{display:flex;gap:8px;justify-content:flex-end}
  .preview{margin-top:14px;padding:10px;border:1px dashed #30363d;border-radius:10px;background:#0d1117}
  .badge{display:inline-block;background:#30363d;border-radius:8px;padding:4px 8px;margin:4px 6px 0 0}
</style>

<div class="wrap">
  <div class="card">
    <h2>Yeni Hat Ekle</h2>

    <form id="routeForm" method="post" action="{{ url_for('add_route') }}">
      <label for="name">Hat Adı</label>
      <input id="name" type="text" name="name" placeholder="Örn: Denizli – İzmir" autocomplete="off" required>

      <label for="stops">Duraklar</label>
      <textarea id="stops" name="stops" placeholder="Her satıra bir durak yazın veya virgülle ayırın.
Örnek:
Esenler Otogar
Alibeyköy
Gebze, Bursa, Korkuteli, Antalya Otogar"></textarea>
      <div class="hint">Virgül (,) ve/veya yeni satır ile ayırabilirsiniz. Boşlukları otomatik temizler.</div>

      <!-- CSRF -->
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

      <div class="row right">
        <button class="btn secondary" type="button" onclick="window.location='{{ url_for('index') }}'">Vazgeç</button>
        <button class="btn primary" type="submit" id="saveBtn">Kaydet</button>
      </div>
    </form>

    <!-- Önizleme -->
    <div class="preview" id="preview" style="display:none">
      <div class="muted" id="countInfo">0 durak</div>
      <div id="badgeBox"></div>
    </div>
  </div>
</div>

<script>
  // Basit doğrulama + önizleme
  const nameEl  = document.getElementById('name');
  const stopsEl = document.getElementById('stops');
  const saveBtn = document.getElementById('saveBtn');
  const preview = document.getElementById('preview');
  const badgeBox= document.getElementById('badgeBox');
  const countInfo = document.getElementById('countInfo');

  function parseStops(raw){
    if(!raw) return [];
    // satır ve virgül bazlı parçala, kırp, boşları at
    const parts = raw
      .split(/\n|,/g)
      .map(s => s.trim())
      .filter(Boolean);
    // yineleneni kaldır (sıra korunur)
    const uniq = [];
    const seen = new Set();
    for(const p of parts){
      if(!seen.has(p)){ seen.add(p); uniq.push(p); }
    }
    return uniq;
  }

  function updatePreview(){
    const stops = parseStops(stopsEl.value);
    badgeBox.innerHTML = '';
    if(stops.length){
      for(const s of stops){
        const span = document.createElement('span');
        span.className = 'badge';
        span.textContent = s;
        badgeBox.appendChild(span);
      }
      countInfo.textContent = stops.length + ' durak';
      preview.style.display = 'block';
    }else{
      preview.style.display = 'none';
    }
    saveBtn.disabled = !nameEl.value.trim() || stops.length === 0;
  }

  nameEl.addEventListener('input', updatePreview);
  stopsEl.addEventListener('input', updatePreview);
  updatePreview();

  // Gönderimden önce metni normalize et (server tarafına temiz liste gitsin)
  document.getElementById('routeForm').addEventListener('submit', (e)=>{
    const name = nameEl.value.trim();
    const stops = parseStops(stopsEl.value);
    if(!name || stops.length === 0){
      e.preventDefault();
      alert('Hat adı ve en az bir durak gerekli.');
      return;
    }
    // Sunucu "virgülle ayrılmış" bekliyorsa normalize et:
    stopsEl.value = stops.join(', ');
  });
</script>
{% endblock %}
