name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Expose python3.11 command
        run: |
          mkdir -p "$RUNNER_TEMP/pybin"
          ln -sf "$(which python)" "$RUNNER_TEMP/pybin/python3.11"
          echo "$RUNNER_TEMP/pybin" >> "$GITHUB_PATH"
          python --version
          python3.11 --version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Android SDK
        working-directory: android_app
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" || true
          cat local.properties
          which python3.11
          python3.11 --version

      - name: Build debug APK
        working-directory: android_app
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          echo "===== APK ARANIYOR ====="
          find android_app/app/build/outputs -type f -name "*.apk" -print -exec ls -lh {} \;

          mkdir -p artifact_apk

          APK_FILE="$(find android_app/app/build/outputs -type f -name "*.apk" | head -1)"

          if [ -z "$APK_FILE" ]; then
            echo "❌ APK dosyası bulunamadı"
            exit 1
          fi

          cp "$APK_FILE" artifact_apk/Muavin-Asistani-debug.apk

          echo "===== ARTIFACT KLASÖRÜ ====="
          ls -lh artifact_apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Muavin-Asistani-debug-apk
          path: artifact_apk/Muavin-Asistani-debug.apk
          if-no-files-found: error
