name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Expose python3.11 command
        run: |
          mkdir -p "$RUNNER_TEMP/pybin"
          ln -sf "$(which python)" "$RUNNER_TEMP/pybin/python3.11"
          echo "$RUNNER_TEMP/pybin" >> "$GITHUB_PATH"
          python --version
          "$RUNNER_TEMP/pybin/python3.11" --version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Android SDK
        working-directory: android_app
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" || true
          echo "===== local.properties ====="
          cat local.properties
          echo "===== python check ====="
          which python || true
          which python3.11 || true
          python3.11 --version

      - name: Build debug APK
        working-directory: android_app
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Muavin-Asistani-debug-apk
          path: android_app/app/build/outputs/apk/debug/*.apk
