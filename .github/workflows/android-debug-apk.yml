name: Android Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.13 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare Android build for GitHub runner
        run: |
          cd android_app

          echo "===== GitHub CI ayar düzeltme ====="

          # Termux native aapt2 yolu GitHub'da çalışmaz.
          sed -i '/android.aapt2FromMavenOverride=/d' gradle.properties || true
          sed -i '/V85H_TERMUX_NATIVE_AAPT2/d' gradle.properties || true
          sed -i '/V90B_TERMUX_NATIVE_AAPT2/d' gradle.properties || true

          # Termux Python yolu GitHub'da yok. GitHub'daki python3.13 kullanılacak.
          sed -i 's#buildPython ".*"#buildPython "python3.13"#' app/build.gradle

          # GitHub runner resmi Android SDK kullandığı için compileSdk 35 güvenli.
          sed -i 's/compileSdk [0-9][0-9]*/compileSdk 35/' app/build.gradle
          sed -i 's/targetSdk [0-9][0-9]*/targetSdk 35/' app/build.gradle

          # AndroidX core tekrar güncel kalabilir.
          sed -i 's#androidx.core:core:[0-9.]*#androidx.core:core:1.13.1#' app/build.gradle

          echo
          echo "===== build.gradle ====="
          grep -nE "compileSdk|targetSdk|buildPython|version|abiFilters|androidx.core" app/build.gradle

          echo
          echo "===== gradle.properties ====="
          cat gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          cd android_app
          gradle -PmuavinBuildProfile=github :app:assembleDebug --stacktrace --no-daemon

      - name: Collect APK
        run: |
          mkdir -p apk-output
          cp android_app/app/build/outputs/apk/debug/app-debug.apk apk-output/muavin-asistani-debug.apk
          ls -lh apk-output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muavin-asistani-debug-apk
          path: apk-output/muavin-asistani-debug.apk
