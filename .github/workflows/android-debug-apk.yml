name: Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.13 for Chaquopy
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Prepare Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify build files
        run: |
          echo "===== build.gradle ====="
          grep -nE "muavinBuildProfile|compileSdk|targetSdk|muavinCoreVersion|androidx.core|buildPython|abiFilters" android_app/app/build.gradle || true
          echo
          echo "===== bad version search ====="
          ! grep -R --exclude="*.bak*" -n "1.13.11.13.1" android_app

      - name: Build debug APK
        working-directory: android_app
        run: gradle -PmuavinBuildProfile=github :app:assembleDebug --stacktrace --no-daemon

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp android_app/app/build/outputs/apk/debug/app-debug.apk artifacts/muavin-asistani-debug.apk
          ls -lh artifacts

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: muavin-asistani-debug-apk
          path: artifacts/muavin-asistani-debug.apk
