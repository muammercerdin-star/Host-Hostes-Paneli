name: güncelleme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle izin ver
        run: chmod +x ./gradlew

      - name: Python kontrol
        run: |
          python3 --version
          python3 -m py_compile app/src/main/python/app.py
          find app/src/main/python/modules -name "*.py" -print -exec python3 -m py_compile {} \;

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: muavin-asistani-debug-apk
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
