name: güncelleme

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Proje dosyalarını kontrol et
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f \( -name "gradlew" -o -name "build.gradle" -o -name "settings.gradle" -o -name "*.gradle" \) -print

      - name: Chaquopy Python link hazırla
        run: |
          which python
          which python3
          python --version
          python3 --version
          ln -sf "$(which python3)" ./python3.11
          chmod +x ./python3.11
          ./python3.11 --version

      - name: Python kontrol
        run: |
          python3 --version
          python3 -m py_compile app/src/main/python/app.py
          find app/src/main/python/modules -name "*.py" -print -exec python3 -m py_compile {} \;

      - name: Build debug APK
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: APK yükle
        uses: actions/upload-artifact@v4
        with:
          name: muavin-asistani-debug-apk
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
