<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paket Yükseltme Gerekli</title>

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at 18% 0%, rgba(37,99,235,.14), transparent 34%),
        linear-gradient(180deg,#f8fbff,#eaf3ff);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:#0f172a;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .card{
      width:min(94vw,540px);
      border-radius:32px;
      padding:24px;
      background:#fff;
      box-shadow:0 28px 80px rgba(15,23,42,.18);
      border:1px solid #e5edf6;
      text-align:center;
    }

    .icon{
      width:78px;
      height:78px;
      display:grid;
      place-items:center;
      border-radius:28px;
      margin:0 auto 16px;
      background:linear-gradient(145deg,#dbeafe,#38bdf8);
      font-size:38px;
      box-shadow:0 16px 34px rgba(37,99,235,.16);
    }

    h1{
      margin:0;
      font-size:32px;
      line-height:1.05;
      font-weight:950;
      color:#0f172a;
    }

    p{
      margin:12px 0 0;
      color:#64748b;
      font-size:17px;
      font-weight:750;
      line-height:1.4;
    }

    .box{
      margin-top:18px;
      padding:15px;
      border-radius:22px;
      background:#eff6ff;
      border:1px solid #bfdbfe;
      color:#1d4ed8;
      font-size:16px;
      font-weight:850;
      line-height:1.35;
      text-align:left;
    }

    .box b{
      color:#0f172a;
    }

    .btn{
      margin-top:18px;
      min-height:58px;
      border-radius:21px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:#fff;
      background:linear-gradient(145deg,#38bdf8,#2563eb);
      font-size:17px;
      font-weight:950;
      box-shadow:0 16px 34px rgba(37,99,235,.26);
    }

    .secondary{
      margin-top:12px;
      color:#2563eb;
      background:#f8fbff;
      border:1px solid #e5edf6;
      box-shadow:none;
    }

    .sub{
      margin-top:14px;
      color:#94a3b8;
      font-size:13px;
      font-weight:800;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">🚀</div>
    <h1>Paket Yükseltme Gerekli</h1>

    <p>Bu özellik mevcut paketinizde açık değil.</p>

    <div class="box">
      <div><b>Özellik:</b> {{ feature }}</div>
      <div><b>Mevcut Paket:</b> {{ current }}</div>
      <div><b>Gerekli Paket:</b> {{ required }} veya üstü</div>
    </div>

    <a class="btn" href="/ayarlar/abonelik?required={{ required|urlencode }}&feature={{ feature|urlencode }}">Paketleri Gör</a>
    <a class="btn secondary" href="/">Ana ekrana dön</a>

    <div class="sub">Sarıkız Host/Hostes Paneli</div>
  </main>
</body>
</html>
