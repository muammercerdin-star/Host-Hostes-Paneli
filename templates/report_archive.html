{% extends "base.html" %}
{% block content %}

<style>
  body{
    background:#06101c;
    color:#eaf2ff;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  .wrap{
    max-width:900px;
    margin:0 auto;
    padding:18px 12px 42px;
  }

  .hero{
    background:linear-gradient(145deg,rgba(37,99,235,.24),rgba(15,23,42,.96));
    border:1px solid rgba(148,163,184,.22);
    border-radius:26px;
    padding:18px;
    box-shadow:0 18px 55px rgba(0,0,0,.42);
    margin-bottom:14px;
  }

  h1{
    margin:0 0 8px;
    font-size:32px;
  }

  .muted{
    color:rgba(226,232,240,.65);
  }

  .item{
    background:rgba(15,23,42,.78);
    border:1px solid rgba(148,163,184,.18);
    border-radius:20px;
    padding:14px;
    margin-bottom:10px;
  }

  .title{
    font-size:20px;
    font-weight:950;
    margin-bottom:10px;
  }

  .actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .btn{
    border:1px solid rgba(148,163,184,.24);
    background:rgba(15,23,42,.82);
    color:#fff;
    border-radius:999px;
    padding:9px 12px;
    font-weight:900;
    text-decoration:none;
  }

  .btn.blue{
    background:linear-gradient(180deg,#3b82f6,#1d4ed8);
  }

  .empty{
    background:rgba(15,23,42,.78);
    border:1px solid rgba(148,163,184,.18);
    border-radius:20px;
    padding:18px;
    color:rgba(226,232,240,.65);
  }
</style>

<div class="wrap">
  <div class="hero">
    <h1>📁 Sefer Rapor Arşivi</h1>
    <div class="muted">Sefer bitince oluşturulan rapor dosyaları burada listelenir.</div>
  </div>

  {% if items %}
    {% for it in items %}
      <div class="item">
        <div class="title">{{ it.title }}</div>
        <div class="actions">
          <a class="btn blue" href="{{ it.view }}">📄 Aç</a>
          <a class="btn" href="{{ it.txt }}">TXT indir</a>
          <a class="btn" href="{{ it.csv }}">CSV indir</a>
          <a class="btn" href="{{ it.json }}">JSON</a>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <div class="empty">Henüz arşivlenmiş sefer raporu yok.</div>
  {% endif %}
</div>

{% endblock %}
