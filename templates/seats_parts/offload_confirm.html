<!-- OFFLOAD CONFIRM MODAL START -->
<style id="offload-confirm-modal-style">
.offload-overlay{
  position:fixed;
  inset:0;
  z-index:999999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:
    radial-gradient(circle at 50% 25%, rgba(37,99,235,.18), transparent 34%),
    rgba(8,15,28,.72);
  backdrop-filter:blur(16px) saturate(1.08);
  -webkit-backdrop-filter:blur(16px) saturate(1.08);
}

.offload-overlay.show{
  display:flex;
}

.offload-box{
  width:min(92vw,410px);
  border-radius:34px;
  overflow:hidden;
  background:
    radial-gradient(circle at 18% 0%, rgba(255,255,255,.96), transparent 30%),
    linear-gradient(180deg,#ffffff 0%,#f7faff 58%,#eef4ff 100%);
  border:1px solid rgba(255,255,255,.86);
  box-shadow:
    0 34px 90px rgba(0,0,0,.40),
    0 0 0 1px rgba(255,255,255,.72) inset;
  animation:offloadPop .18s ease-out both;
}

@keyframes offloadPop{
  from{ transform:translateY(18px) scale(.96); opacity:0; }
  to{ transform:translateY(0) scale(1); opacity:1; }
}

.offload-top{
  padding:24px 24px 12px;
  display:grid;
  grid-template-columns:62px 1fr;
  align-items:center;
  gap:16px;
}

.offload-mark{
  width:62px;
  height:62px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,.75), transparent 32%),
    linear-gradient(135deg,#e0f2fe,#bfdbfe);
  box-shadow:
    0 14px 28px rgba(37,99,235,.16),
    inset 0 1px 0 rgba(255,255,255,.92);
}

.offload-title{
  margin:0;
  color:#0f172a;
  font-size:28px;
  line-height:1.03;
  font-weight:1000;
  letter-spacing:-.7px;
}

.offload-small{
  margin:6px 0 0;
  color:#64748b;
  font-size:14px;
  line-height:1.2;
  font-weight:850;
}

.offload-content{
  padding:4px 24px 20px;
}

.offload-text{
  margin:0;
  color:#334155;
  font-size:17px;
  line-height:1.45;
  font-weight:750;
}

.offload-stop{
  margin-top:14px;
  padding:14px 15px;
  border-radius:20px;
  background:linear-gradient(180deg,rgba(239,246,255,.96),rgba(219,234,254,.92));
  border:1px solid rgba(147,197,253,.32);
  color:#1e3a8a;
  font-size:15px;
  line-height:1.35;
  font-weight:950;
}

.offload-note{
  margin-top:12px;
  padding:13px 14px;
  border-radius:20px;
  background:linear-gradient(180deg,rgba(254,243,199,.90),rgba(255,251,235,.94));
  border:1px solid rgba(251,191,36,.24);
  color:#92400e;
  font-size:13.5px;
  line-height:1.35;
  font-weight:850;
}

.offload-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:0 24px 24px;
}

.offload-btn{
  height:56px;
  border:0;
  border-radius:20px;
  font-size:16px;
  font-weight:1000;
  cursor:pointer;
  font-family:inherit;
}

.offload-cancel{
  color:#334155;
  background:linear-gradient(180deg,#ffffff,#eef3fb);
  border:1px solid rgba(148,163,184,.20);
  box-shadow:
    0 12px 24px rgba(15,23,42,.08),
    inset 0 1px 0 rgba(255,255,255,.92);
}

.offload-ok{
  color:#fff;
  background:
    radial-gradient(circle at 35% 20%, rgba(255,255,255,.22), transparent 30%),
    linear-gradient(135deg,#22c55e 0%,#16a34a 52%,#15803d 100%);
  box-shadow:
    0 16px 30px rgba(22,163,74,.28),
    inset 0 1px 0 rgba(255,255,255,.18);
}

.offload-btn:active{
  transform:scale(.975);
}

@media(max-width:420px){
  .offload-overlay{ padding:18px; }
  .offload-box{ width:min(94vw,390px); border-radius:30px; }
  .offload-top{ padding:22px 20px 10px; grid-template-columns:58px 1fr; gap:14px; }
  .offload-mark{ width:58px; height:58px; border-radius:20px; font-size:28px; }
  .offload-title{ font-size:25px; }
  .offload-content{ padding:4px 20px 18px; }
  .offload-text{ font-size:16px; }
  .offload-actions{ padding:0 20px 22px; gap:10px; }
  .offload-btn{ height:52px; border-radius:18px; font-size:15px; }
}
</style>

<div class="offload-overlay" id="offloadConfirmModal" aria-hidden="true">
  <div class="offload-box" role="dialog" aria-modal="true" aria-labelledby="offloadConfirmTitle">
    <div class="offload-top">
      <div class="offload-mark">🔔</div>
      <div>
        <h2 class="offload-title" id="offloadConfirmTitle">İnecekleri indirelim mi?</h2>
        <p class="offload-small">Seçili durak işlemi yapılacak.</p>
      </div>
    </div>

    <div class="offload-content">
      <p class="offload-text" id="offloadConfirmText">
        Bu durakta inecek yolcu ve ilgili işlemler sistem tarafından tamamlanacak.
      </p>

      <div class="offload-stop">
        🎯 Durak: <span id="offloadConfirmStop">—</span>
      </div>

      <div class="offload-note">
        Emin değilsen iptal edip koltuk planına dönebilirsin.
      </div>
    </div>

    <div class="offload-actions">
      <button type="button" class="offload-btn offload-cancel" id="offloadConfirmCancel">İptal</button>
      <button type="button" class="offload-btn offload-ok" id="offloadConfirmOk">İndir</button>
    </div>
  </div>
</div>

<script id="offload-confirm-modal-js">
(function(){
  let resolver = null;

  const modal = document.getElementById("offloadConfirmModal");
  const stopEl = document.getElementById("offloadConfirmStop");
  const textEl = document.getElementById("offloadConfirmText");
  const cancelBtn = document.getElementById("offloadConfirmCancel");
  const okBtn = document.getElementById("offloadConfirmOk");

  if(!modal || !stopEl || !cancelBtn || !okBtn) return;

  function close(result){
    modal.classList.remove("show");
    modal.setAttribute("aria-hidden","true");
    document.body.style.overflow = "";

    if(resolver){
      resolver(result);
      resolver = null;
    }
  }

  window.askOffloadConfirm = function(stop, info){
    stopEl.textContent = stop || "seçili durak";

    const count = Number(info?.count || 0);
    if(textEl){
      textEl.textContent = count > 0
        ? `Bu durakta ${count} yolcu indirilecek.\nYolcu, ayakta yolcu ve ilgili işlemler tamamlanacak.`
        : "Bu durakta inecek yolcu bulunuyor.\nYolcu, ayakta yolcu ve ilgili işlemler tamamlanacak.";
    }

    modal.classList.add("show");
    modal.setAttribute("aria-hidden","false");
    document.body.style.overflow = "hidden";

    return new Promise(resolve => {
      resolver = resolve;
    });
  };

  cancelBtn.addEventListener("click", () => close(false));
  okBtn.addEventListener("click", () => close(true));

  modal.addEventListener("click", function(e){
    if(e.target === modal) close(false);
  });

  document.addEventListener("keydown", function(e){
    if(e.key === "Escape" && modal.classList.contains("show")){
      close(false);
    }
  });
})();
</script>
<!-- OFFLOAD CONFIRM MODAL END -->
