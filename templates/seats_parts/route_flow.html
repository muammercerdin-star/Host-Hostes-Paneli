<div class="route-strip-shell">
  <div class="route-strip-head">
    <div class="route-strip-title">Durak Akışı</div>

    <div class="route-strip-meta">
      <div class="route-pill route-pill-live">
        <span class="route-mini-dot"></span>
        <span class="route-mini-label">Canlı:</span>
        <span class="route-name-window">
          <b id="routeMiniLive">—</b>
        </span>
      </div>

      <div class="route-pill route-pill-next">
        <span class="route-mini-label">Sıradaki:</span>
        <span class="route-name-window">
          <b id="routeMiniNext">—</b>
        </span>
      </div>

      <button id="nightVoiceToggle" class="night-voice-toggle" type="button" title="Sesli robot">🔊 Ses Açık</button>
    </div>
  </div>

  <div class="route-strip" id="routeStrip">
    <div class="route-stop active">
      <div class="name">Rota hazırlanıyor</div>
      <div class="meta">Duraklar yüklenecek</div>
    </div>
  </div>
</div>
