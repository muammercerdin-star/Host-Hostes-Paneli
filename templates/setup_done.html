<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kurulum Tamamlandı</title>

  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:linear-gradient(180deg,#f8fbff,#eaf3ff);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      color:#0f172a;
    }

    .shell{
      width:min(94vw,720px);
      margin:18px auto 28px;
      padding:16px;
      border-radius:30px;
      background:#fff;
      box-shadow:0 28px 80px rgba(15,23,42,.18);
    }

    .hero{
      padding:24px 20px;
      border-radius:26px;
      background:linear-gradient(145deg,#22c55e,#0f766e);
      color:#fff;
      margin-bottom:14px;
    }

    h1{
      margin:0;
      font-size:32px;
      font-weight:950;
    }

    p{
      color:#64748b;
      font-size:16px;
      font-weight:700;
      line-height:1.35;
    }

    .code-box{
      margin:16px 0;
      padding:18px;
      border-radius:22px;
      background:#eff6ff;
      border:1px dashed rgba(37,99,235,.45);
      text-align:center;
    }

    .code{
      font-size:24px;
      line-height:1.15;
      font-weight:950;
      word-break:break-word;
    }

    .btn{
      min-height:58px;
      border-radius:21px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:17px;
      font-weight:950;
      color:#fff;
      background:linear-gradient(145deg,#38bdf8,#2563eb);
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="hero">
      <h1>✅ Kurulum Tamamlandı</h1>
    </section>

    <p><b>{{ full_name }}</b>, panel başarıyla oluşturuldu.</p>

    <p>Şifreni unutursan aşağıdaki kurtarma koduyla yeni şifre belirleyebilirsin. Bu kodu güvenli bir yere not et.</p>

    <div class="code-box">
      <div class="code">{{ recovery_code }}</div>
    </div>

    <a class="btn" href="/login">Oturum Aç</a>
  </main>
</body>
</html>
